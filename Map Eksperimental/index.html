<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Collaborative Map Editor</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-minimap/dist/Control.MiniMap.min.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }

        #uiPanel {
            position: fixed;
            top: 10px;
            left: 50px; /* adjusted to clear Leaflet zoom controls */
            z-index: 999999;
            background: white;
            padding: 10px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            font-size: 13px;
            font-family: sans-serif;
            border: 2px solid rgba(0,0,0,0.2);
        }

        .roomLabel {
            background: rgba(255,255,255,0.9);
            border: 1.5px solid #cc0000;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
            color: #000;
            white-space: nowrap;
            pointer-events: none;
            border-radius: 3px;
            z-index: 500 !important;
        }

        .popup-input {
            width: 95%;
            margin-top: 3px;
        }
        
        label { cursor: pointer; }
    </style>
</head>

<body>
    
<div id="uiPanel">
    <input id="search" placeholder="Search marker..." style="margin-bottom: 8px;">
    <br>
    <label>
        <input type="checkbox" id="enableBoxEdit">
        Enable Box Edit (Draw)
    </label>
    <br>
    <label>
        <input type="checkbox" id="enableBoxVisibility" checked>
        Enable Block Visibility
    </label>
    <br>
    <label>
        <input type="checkbox" id="autoScroll" checked>
        Auto Scroll
    </label>
    <br><br>
    <button id="resetView">Reset View</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-minimap/dist/Control.MiniMap.min.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
/* ---------------- MAP CONFIG ---------------- */
var map = L.map('map',{
    crs: L.CRS.Simple,
    minZoom: -2,
    maxZoom: 4,
    inertia: false
});

var bounds = [[-1000, 0], [1053, 1800]];
L.imageOverlay("map.jpg", bounds).addTo(map);
map.fitBounds(bounds);

/* ---------------- EDGE PAN ---------------- */
map.on("mousemove", function(e){
    if(!document.getElementById("autoScroll").checked) return;

    var edge = 40;
    var size = map.getSize();
    var p = map.latLngToContainerPoint(e.latlng);

    var panX = 0;
    var panY = 0;

    if(p.x < edge) panX = -20;
    if(p.x > size.x - edge) panX = 20;

    if(p.y < edge) panY = -20;
    if(p.y > size.y - edge) panY = 20;

    if(panX !== 0 || panY !== 0){
        map.panBy([panX, panY], {animate: false});
    }
});

/* disable right click menu */
map.getContainer().addEventListener("contextmenu", function(e){
    e.preventDefault();
});

/* ---------------- MINIMAP ---------------- */
var miniLayer = L.imageOverlay("map.jpg", bounds);
new L.Control.MiniMap(miniLayer, {toggleDisplay: true}).addTo(map);

/* ---------------- CLUSTER ---------------- */
var cluster = L.markerClusterGroup({
    chunkedLoading: true,
    maxClusterRadius: 40
});
map.addLayer(cluster);

/* ---------------- API CONFIG ---------------- */
var apiURL = "https://script.google.com/macros/s/AKfycbx2ByJdIC5EaJm6sVoEZgePx02IaD7a_M5bHOcupEqzihb66kixv2gaEYWfDwDPA7Tk/exec";
var sheetBase = "https://docs.google.com/spreadsheets/d/1durCtJ-WumfVgBOH6E_Yegc2LIUG98mHmAff-t63P0g/edit#gid=0&range=A";

/* ---------------- STORAGE & STATE ---------------- */
var markers = {};
var editingRows = {};
var undoStack = [];
var editingMarker = null;
var boxes = {};

var boxGroup = L.layerGroup().addTo(map);

let drawing = false;
let startPoint = null;
let previewBox = null;

/* ---------------- DRAWING BOXES ---------------- */
map.on("mousedown", function(e){
    if(!document.getElementById("enableBoxEdit").checked) return;

    drawing = true;
    startPoint = e.latlng;

    previewBox = L.rectangle([startPoint, startPoint], {
        color: "red",
        weight: 2,
        fillOpacity: 0.2,
        dashArray: "5,5"
    }).addTo(map);
});

map.on("mousemove", function(e){
    if(!drawing || !previewBox) return;
    previewBox.setBounds([startPoint, e.latlng]);
});

map.on("mouseup", function(e){
    if(!drawing) return;
    drawing = false;

    const endPoint = e.latlng;

    if(previewBox){
        map.removeLayer(previewBox);
        previewBox = null;
    }

    const x1 = Math.round(startPoint.lng);
    const y1 = Math.round(startPoint.lat);
    const x2 = Math.round(endPoint.lng);
    const y2 = Math.round(endPoint.lat);

    const room = prompt("Room name?");
    if(!room) return;

    const people = prompt("People count?", "0");

    fetch(`${apiURL}?mode=addBox&room=${encodeURIComponent(room)}&people=${people}&x1=${x1}&y1=${y1}&x2=${x2}&y2=${y2}`);
});

/* ---------------- BOX LOADER ---------------- */
function loadBoxes(){
    fetch(apiURL + "?mode=boxes&t=" + Date.now(), {cache: "no-store"})
    .then(r => r.json())
    .then(data => {
        var seen = {};

        data.forEach(b => {
            var row = b.row;
            var x1 = Number(b.x1);
            var y1 = Number(b.y1);
            var x2 = Number(b.x2);
            var y2 = Number(b.y2);

            if([x1, y1, x2, y2].some(v => isNaN(v))) return;
            seen[row] = true;

            var rectBounds = [
                [Math.min(y1, y2), Math.min(x1, x2)],
                [Math.max(y1, y2), Math.max(x1, x2)]
            ];

            if(!boxes[row]){
                boxes[row] = L.rectangle(rectBounds, {
                    color: b.line,
                    weight: 2,
                    fillColor: b.fill,
                    fillOpacity: b.fillOpacity
                }).addTo(boxGroup); // Add to group, not map directly

                boxes[row].bindTooltip(
                    "<b>" + b.room + "</b><br>People: " + b.people,
                    {permanent: true, direction: "center", className: "roomLabel"}
                );
            } else {
                boxes[row].setBounds(rectBounds);
                boxes[row].setTooltipContent("<b>" + b.room + "</b><br>People: " + b.people);
            }
        });

        Object.keys(boxes).forEach(r => {
            if(!seen[r]){
                boxGroup.removeLayer(boxes[r]);
                delete boxes[r];
            }
        });
    })
    .catch(err => console.error("Error loading boxes:", err));
}

/* ---------------- BLOCK VISIBILITY TOGGLE ---------------- */
document.getElementById("enableBoxVisibility").addEventListener("change", function(e) {
    if (e.target.checked) {
        map.addLayer(boxGroup);
    } else {
        map.removeLayer(boxGroup);
    }
});

/* ---------------- UNDO ---------------- */
function pushUndo(a){ undoStack.push(a); }

function undo(){
    var action = undoStack.pop();
    if(!action) return;

    if(action.type === "move"){
        fetch(apiURL + "?mode=update&row=" + action.row + "&x=" + action.oldX + "&y=" + action.oldY + "&t=" + Date.now());
    }

    if(action.type === "delete"){
        fetch(apiURL + "?name=" + encodeURIComponent(action.name) + "&x=" + action.x + "&y=" + action.y + "&desc=" + encodeURIComponent(action.desc) + "&cat=" + encodeURIComponent(action.cat) + "&t=" + Date.now());
    }

    if(action.type === "create" && action.row){
        fetch(apiURL + "?mode=delete&row=" + action.row + "&t=" + Date.now());
    }

    if(action.type === "text"){
        fetch(apiURL + "?mode=text&row=" + action.row + "&name=" + encodeURIComponent(action.oldName) + "&desc=" + encodeURIComponent(action.oldDesc) + "&t=" + Date.now());
    }

    loadPoints();
}

document.addEventListener("keydown", function(e){
    if(e.ctrlKey && e.key === "z"){
        e.preventDefault();
        undo();
    }
});

/* ---------------- COLORS & ICONS ---------------- */
var colors = {
    Red: "red",
    Blue: "blue",
    Green: "green",
    Yellow: "orange",
    Default: "black"
};

function markerIcon(color){
    return L.icon({
        iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-" + color + ".png",
        shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });
}

/* ---------------- MARKER OPERATIONS ---------------- */
function deleteMarker(row){
    if(!confirm("Delete marker?")) return;

    var m = markers[row];
    var p = m.getLatLng();

    pushUndo({
        type: "delete",
        name: m.name,
        desc: "",
        cat: m.category,
        x: Math.round(p.lng),
        y: Math.round(p.lat)
    });

    fetch(apiURL + "?mode=delete&row=" + row + "&t=" + Date.now());

    cluster.removeLayer(m);
    delete markers[row];
}

function updateText(row){
    var marker = markers[row];
    var name = document.getElementById("name_" + row).value;
    var desc = document.getElementById("desc_" + row).value;
    var cat = marker.category; 

    pushUndo({
        type: "text",
        row: row,
        oldName: marker.name,
        oldDesc: "" 
    });

    marker.name = name;

    fetch(apiURL + "?mode=text&row=" + row + "&name=" + encodeURIComponent(name) + "&desc=" + encodeURIComponent(desc) + "&cat=" + encodeURIComponent(cat) + "&t=" + Date.now())
    .then(response => {
        if(response.ok) {
            console.log("Update successful");
            marker.closePopup(); 
        }
    })
    .catch(err => console.error("Update failed:", err));
}

function saveLocation(row, location) {
    var url = apiURL + "?mode=saveLocation&row=" + row + "&location=" + encodeURIComponent(location) + "&t=" + Date.now();
    fetch(url)
    .then(() => {
        alert("Location '" + location + "' recorded to pasien-pindah");
    })
    .catch(err => alert("Error saving location"));
}

/* ---------------- POPUP ---------------- */
function popupContent(row, name, desc, x, y, patientRoom){
    var sheetLink = sheetBase + row;

    return `
        <b>Marker</b><br>

        Nama:<br>
        <input class="popup-input" id="name_${row}" value="${name}" onfocus="editingMarker=${row}" onblur="editingMarker=null">

        Nomor RM:<br>
        <input class="popup-input" id="desc_${row}" value="${desc}" onfocus="editingMarker=${row}" onblur="editingMarker=null">

        <small>Current: <b>${patientRoom || 'Detecting...'}</b></small>
        <hr>
        <button type="button" onclick="saveLocation(${row}, '${patientRoom}')" style="width:100%; margin-bottom:5px; background:#e1f5fe; border:1px solid #01579b; cursor:pointer;">
            📍 Log to Sebelum-Pindah
        </button>
        <br>

        <br>X: ${x} Y: ${y}
        <br><a href="${sheetLink}" target="_blank">Open Sheet Row</a>
        <br>
        <button type="button" onclick="updateText(${row})" style="margin-top:5px; cursor:pointer;">Save</button>
        <button type="button" onclick="deleteMarker(${row})" style="margin-top:5px; cursor:pointer;">Delete</button>
    `;
}

/* ---------------- LOAD MARKERS ---------------- */
function loadPoints(){
    fetch(apiURL + "?mode=read&t=" + Date.now(), {cache: "no-store"})
    .then(r => r.json())
    .then(data => {
        var seen = {};

        data.forEach(p => {
            var row = p.row;
            var name = p.name || "";
            var desc = p.desc || "";
            var x = Number(p.x);
            var y = Number(p.y);
            var cat = p.cat || "Default";
            var patientRoom = p.patientRoom || "Outside"; 

            if(isNaN(x) || isNaN(y)) return;
            seen[row] = true;

            var color = colors[cat] || colors.Default;

            if(!markers[row]){
                var marker = L.marker([y, x], {
                    icon: markerIcon(color),
                    draggable: true
                });

                cluster.addLayer(marker);
                markers[row] = marker;

                marker.row = row;
                marker.name = name;
                marker.category = cat;
                marker.patientRoom = patientRoom;

                marker.bindPopup(popupContent(row, name, desc, x, y, patientRoom));

                marker.on("dragstart", function(){
                    map.dragging.disable();
                    var p = marker.getLatLng();
                    marker._oldX = Math.round(p.lng);
                    marker._oldY = Math.round(p.lat);
                });

                marker.on("dragend", function(e){
                    map.dragging.enable();
                    var p = e.target.getLatLng();
                    var nx = Math.round(p.lng);
                    var ny = Math.round(p.lat);

                    pushUndo({
                        type: "move",
                        row: row,
                        oldX: marker._oldX,
                        oldY: marker._oldY
                    });

                    fetch(apiURL + "?mode=update&row=" + row + "&x=" + nx + "&y=" + ny + "&t=" + Date.now());
                });

                marker.on("contextmenu", function(){
                    deleteMarker(row);
                });

            } else {
                if (editingMarker === row) return;

                if (markers[row].getPopup() && markers[row].getPopup().isOpen()) {
                    markers[row].patientRoom = patientRoom; 
                    return;
                }

                markers[row].setLatLng([y, x]);
                markers[row].patientRoom = patientRoom; 
                markers[row].setPopupContent(popupContent(row, name, desc, x, y, patientRoom));
            }
        });

        Object.keys(markers).forEach(r => {
            if(!seen[r]){
                cluster.removeLayer(markers[r]);
                delete markers[r];
            }
        });
    })
    .catch(err => console.error("Error loading points:", err));
}

/* ---------------- SEARCH ---------------- */
document.getElementById("search").addEventListener("input", function(){
    var q = this.value.toLowerCase();
    Object.values(markers).forEach(m => {
        if(!m.name) return;
        if(m.name.toLowerCase().includes(q)){
            m.setOpacity(1);
        } else {
            m.setOpacity(0.2);
        }
    });
});

/* ---------------- ADD MARKER ON CLICK ---------------- */
map.on("click", function(e){
    // Don't add a marker if we are in box-drawing mode
    var boxEditToggle = document.getElementById("enableBoxEdit");
    if(boxEditToggle && boxEditToggle.checked) return;

    var x = Math.round(e.latlng.lng);
    var y = Math.round(e.latlng.lat);

    var name = prompt("Nama?");
    if(!name) return;

    var desc = prompt("Nomor RM?") || "";
    var cat = prompt("Warna? (Red/Blue/Green/Yellow)") || "Default";

    pushUndo({type: "create"});

    fetch(apiURL + "?mode=addMarker&name=" + encodeURIComponent(name) + "&x=" + x + "&y=" + y + "&desc=" + encodeURIComponent(desc) + "&cat=" + encodeURIComponent(cat) + "&t=" + Date.now());
});

/* ---------------- UI ACTIONS ---------------- */
document.getElementById("resetView").addEventListener("click", function() {
    map.fitBounds(bounds);
});

/* ---------------- INIT & AUTO REFRESH ---------------- */
loadPoints();
loadBoxes();

setInterval(function(){
    loadPoints();
    loadBoxes();
}, 1000);

</script>
</body>
</html>
